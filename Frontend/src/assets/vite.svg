<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" fill="none">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#7c3aed;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Background Circle -->
  <circle cx="50" cy="50" r="48" fill="url(#grad)" stroke="white" stroke-width="2"/>
  
  <!-- Book/Pages Icon for Blog -->
  <rect x="32" y="30" width="36" height="40" rx="4" fill="white" opacity="0.95"/>
  <rect x="38" y="36" width="24" height="28" rx="2" fill="url(#grad)" opacity="0.3"/>
  
  <!-- Bookmark -->
  <path d="M50 30 L46 44 L50 41 L54 44 L50 30Z" fill="#fbbf24"/>
  
  <!-- Text Lines -->
  <line x1="40" y1="44" x2="60" y2="44" stroke="url(#grad)" stroke-width="2.5" stroke-linecap="round" opacity="0.9"/>
  <line x1="40" y1="52" x2="60" y2="52" stroke="url(#grad)" stroke-width="2.5" stroke-linecap="round" opacity="0.7"/>
  <line x1="40" y1="60" x2="52" y2="60" stroke="url(#grad)" stroke-width="2.5" stroke-linecap="round" opacity="0.5"/>
  
  <!-- Center Glow -->
  <circle cx="50" cy="48" r="2.5" fill="#fbbf24"/>
</svg>
